version: "3.9"

services:
  db:
    image: postgres:15
    container_name: notes_postgres
    restart: always
    environment:
      POSTGRES_USER: notes_user
      POSTGRES_PASSWORD: notes_password
      POSTGRES_DB: notes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: notes_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  postgres_data: